<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>True Engagement · WorldFirst Social Standard</title>
<style>

:root {
  --ink: #1d1d1f;
  --ink-soft: #4a4a4f;
  --ink-muted: #86868b;
  --rule: #e5e5e7;
  --rule-soft: #f0f0f2;
  --bg: #ffffff;
  --bg-alt: #fafafa;
  --bg-row: #fbfbfc;
  --good: #047857;
  --good-bg: #f0fdf4;
  --bad: #b91c1c;
  --bad-bg: #fef2f2;
  --na: #c4c4c8;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.wrap {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 28px 80px;
}
header {
  border-bottom: 1px solid var(--rule);
  padding-bottom: 20px;
  margin-bottom: 28px;
}
.eyebrow {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 8px;
}
h1 {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0 0 10px;
  line-height: 1.15;
}
.principle {
  font-size: 15px;
  color: var(--ink);
  margin: 0;
  max-width: 760px;
  line-height: 1.5;
}
.meta {
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 14px;
}

h2 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin: 36px 0 14px;
}

/* === Main basket grid === */
table.grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 8px;
}
table.grid th {
  text-align: left;
  padding: 10px 12px;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--bg-alt);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  vertical-align: middle;
}
table.grid th.center { text-align: center; }
table.grid td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--rule-soft);
  vertical-align: middle;
}
table.grid td.platform {
  font-weight: 600;
  color: var(--ink);
  font-size: 14px;
  width: 110px;
}
table.grid td.center { text-align: center; }
table.grid tr:hover td:not(.platform) { background: var(--bg-row); }

/* === Component grid (✓/✗ per platform per signal) === */
table.components {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin: 0 0 24px;
}
table.components th {
  padding: 10px 8px;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--bg-alt);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  text-align: center;
  vertical-align: middle;
}
table.components th.signal {
  text-align: left;
  padding-left: 14px;
  width: 220px;
}
table.components th .sub {
  display: block;
  font-size: 9px;
  color: var(--na);
  letter-spacing: 0.04em;
  font-weight: 500;
  margin-top: 2px;
}
table.components td {
  padding: 9px 8px;
  border-bottom: 1px solid var(--rule-soft);
  vertical-align: middle;
  text-align: center;
  font-size: 13px;
}
table.components td.signal {
  text-align: left;
  padding-left: 14px;
  font-weight: 500;
  color: var(--ink);
}
table.components td.signal .src {
  display: block;
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 400;
  margin-top: 2px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.mark.yes { color: var(--good); font-weight: 700; font-size: 15px; }
.mark.no { color: var(--bad); font-weight: 700; font-size: 15px; }
.mark.na { color: var(--na); font-size: 13px; }
.mark.partial { color: var(--ink-muted); font-size: 11px; font-weight: 500; }
.row-grouphead td {
  background: var(--bg-alt);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  padding: 8px 14px;
  border-bottom: 1px solid var(--rule);
  border-top: 1px solid var(--rule);
}
.row-grouphead.exclude td { color: var(--bad); }

/* === Sources sheet === */
table.sources {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
table.sources th {
  text-align: left;
  padding: 9px 12px;
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--bg-alt);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
table.sources td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--rule-soft);
  vertical-align: top;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11.5px;
}
table.sources td.plat {
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
  width: 100px;
}

/* === Legend + notes === */
.legend {
  display: flex;
  gap: 18px;
  font-size: 12px;
  color: var(--ink-muted);
  margin: 10px 0 0;
  flex-wrap: wrap;
}
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend .mark { font-size: 14px; }

.callout {
  background: var(--bg-alt);
  border-left: 2px solid var(--ink-muted);
  padding: 14px 18px;
  margin: 16px 0;
  font-size: 13px;
  color: var(--ink-soft);
  border-radius: 0 6px 6px 0;
}
.callout strong { color: var(--ink); }

.formula {
  background: var(--bg-alt);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 14px 18px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: var(--ink);
  margin: 12px 0;
}

footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--rule);
  font-size: 12px;
  color: var(--ink-muted);
}
footer a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--rule); }
footer a:hover { border-color: var(--ink-muted); }

@media (max-width: 720px) {
  .wrap { padding: 28px 16px 60px; }
  h1 { font-size: 26px; }
  table.components td, table.components th { padding: 8px 4px; font-size: 11px; }
  table.components th.signal, table.components td.signal { padding-left: 8px; }
}


body.locked #content { filter: blur(20px); pointer-events: none; }
#gate { position: fixed; inset: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; }
#gate-card { background: #fff; border: 1px solid #e5e5e7; border-radius: 8px; padding: 32px 36px; max-width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.05); font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
#gate-card h2 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em; font-weight: 600; }
#gate-card .gate-sub { color: #86868b; font-size: 13px; margin-bottom: 20px; }
#gate-form { display: flex; gap: 8px; }
#gate-input { flex: 1; padding: 9px 12px; border: 1px solid #e5e5e7; border-radius: 5px; font-size: 14px; font-family: inherit; }
#gate-input:focus { outline: none; border-color: #1d1d1f; }
#gate-btn { padding: 9px 16px; background: #1d1d1f; color: #fff; border: none; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; }
#gate-btn:hover { opacity: 0.85; }
#gate-err { color: #b91c1c; font-size: 12px; min-height: 16px; margin-top: 10px; }
.lock-link { display: block; margin-top: 60px; text-align: center; color: #aaa; font-size: 11px; }
.lock-link a { color: inherit; text-decoration: none; }
.lock-link a:hover { color: #777; }
</style>

<script>
function b64ToBytes(b64) { const bin = atob(b64); const bytes = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i); return bytes; }
async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
}
async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt); const iv = b64ToBytes(blob.iv); const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}
async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input'); const err = document.getElementById('gate-err'); err.textContent = '';
  try {
    const innerHtml = await decryptPayload(inp.value);
    document.getElementById('content').innerHTML = innerHtml;
    document.getElementById('content').hidden = false;
    document.getElementById('gate').style.display = 'none';
    document.body.classList.remove('locked');
    try { localStorage.setItem('true_engagement_pw', inp.value); } catch (_) {}
  } catch (ex) { err.textContent = 'wrong password'; inp.value = ''; inp.focus(); }
  return false;
}
(async () => {
  try {
    const cached = localStorage.getItem('true_engagement_pw');
    if (cached) {
      const innerHtml = await decryptPayload(cached);
      document.getElementById('content').innerHTML = innerHtml;
      document.getElementById('content').hidden = false;
      document.getElementById('gate').style.display = 'none';
      document.body.classList.remove('locked');
    }
  } catch (_) { try { localStorage.removeItem('true_engagement_pw'); } catch (_) {} }
})();
</script>
