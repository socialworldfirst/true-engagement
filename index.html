<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>True Engagement · WorldFirst Social Standard</title>
<style>

:root {
  --ink: #1d1d1f;
  --ink-soft: #4a4a4f;
  --ink-muted: #86868b;
  --rule: #e5e5e7;
  --rule-soft: #f0f0f2;
  --bg: #ffffff;
  --bg-alt: #fafafa;
  --accent: #0066cc;
  --good: #047857;
  --bad: #b91c1c;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "kern";
}
.wrap {
  max-width: 920px;
  margin: 0 auto;
  padding: 56px 32px 96px;
}
header {
  border-bottom: 1px solid var(--rule);
  padding-bottom: 28px;
  margin-bottom: 40px;
}
.eyebrow {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 12px;
}
h1 {
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0 0 16px;
  line-height: 1.15;
}
.lead {
  font-size: 17px;
  color: var(--ink-soft);
  max-width: 640px;
  margin: 0;
}
.meta {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 16px;
}
section {
  margin: 56px 0;
}
h2 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0 0 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--rule);
}
h3 {
  font-size: 16px;
  font-weight: 600;
  margin: 28px 0 10px;
  color: var(--ink);
}
p {
  margin: 0 0 14px;
  color: var(--ink-soft);
}
p.tight { margin-bottom: 8px; }
.headline-card {
  background: var(--bg-alt);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 28px 32px;
  margin: 32px 0;
}
.headline-card p {
  font-size: 17px;
  color: var(--ink);
  margin: 0;
  font-weight: 500;
  line-height: 1.5;
}
.headline-card .principle {
  font-weight: 600;
}
.principle-tag {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}
th, td {
  text-align: left;
  padding: 12px 14px;
  border-bottom: 1px solid var(--rule);
  vertical-align: top;
}
th {
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-muted);
  border-bottom: 1px solid var(--ink-muted);
}
td.platform {
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
}
td.basket {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.5;
}
.in, .out {
  font-weight: 600;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.in { color: var(--good); background: #f0fdf4; border: 1px solid #bbf7d0; }
.out { color: var(--bad); background: #fef2f2; border: 1px solid #fecaca; }
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 720px) {
  .two-col { grid-template-columns: 1fr; }
  h1 { font-size: 30px; }
  .wrap { padding: 36px 20px 64px; }
}
.box {
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 20px 22px;
}
.box h3 { margin-top: 0; }
.box ul {
  margin: 6px 0 0;
  padding-left: 18px;
}
.box li {
  margin: 5px 0;
  color: var(--ink-soft);
  font-size: 14px;
}
.note {
  font-size: 13px;
  color: var(--ink-muted);
  border-left: 2px solid var(--rule);
  padding: 4px 0 4px 14px;
  margin: 20px 0;
}
footer {
  margin-top: 80px;
  padding-top: 28px;
  border-top: 1px solid var(--rule);
  font-size: 13px;
  color: var(--ink-muted);
}
footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }
code {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px;
  background: var(--rule-soft);
  padding: 1px 5px;
  border-radius: 3px;
}
.platform-card {
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 22px 24px;
  margin: 18px 0;
}
.platform-card .head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule-soft);
}
.platform-card .name {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.platform-card .sub {
  font-size: 12px;
  color: var(--ink-muted);
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.bk {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 12px 18px;
  margin-top: 12px;
  font-size: 14px;
}
.bk .lbl {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  padding-top: 3px;
}
.bk .val {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.55;
}
.bk .val.note { color: var(--ink-muted); font-style: italic; font-family: inherit; }
hr {
  border: 0;
  border-top: 1px solid var(--rule);
  margin: 32px 0;
}


body.locked #content { filter: blur(20px); pointer-events: none; }
#gate { position: fixed; inset: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; }
#gate-card { background: #fff; border: 1px solid #e5e5e7; border-radius: 8px; padding: 32px 36px; max-width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.05); font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
#gate-card h2 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em; font-weight: 600; }
#gate-card .gate-sub { color: #86868b; font-size: 13px; margin-bottom: 20px; }
#gate-form { display: flex; gap: 8px; }
#gate-input { flex: 1; padding: 9px 12px; border: 1px solid #e5e5e7; border-radius: 5px; font-size: 14px; font-family: inherit; }
#gate-input:focus { outline: none; border-color: #1d1d1f; }
#gate-btn { padding: 9px 16px; background: #1d1d1f; color: #fff; border: none; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; }
#gate-btn:hover { opacity: 0.85; }
#gate-err { color: #b91c1c; font-size: 12px; min-height: 16px; margin-top: 10px; }
.lock-link { display: block; margin-top: 60px; text-align: center; color: #aaa; font-size: 11px; }
.lock-link a { color: inherit; text-decoration: none; }
.lock-link a:hover { color: #777; }
</style>

</div>

<script>
function b64ToBytes(b64) { const bin = atob(b64); const bytes = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i); return bytes; }
async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
}
async function decryptPayload(password) {
  const blob = JSON.parse(document.getElementById('payload').textContent);
  const salt = b64ToBytes(blob.salt); const iv = b64ToBytes(blob.iv); const ct = b64ToBytes(blob.ciphertext);
  const key = await deriveKey(password, salt, blob.iterations);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}
async function gateSubmit(e) {
  e.preventDefault();
  const inp = document.getElementById('gate-input'); const err = document.getElementById('gate-err'); err.textContent = '';
  try {
    const innerHtml = await decryptPayload(inp.value);
    document.getElementById('content').innerHTML = innerHtml;
    document.getElementById('content').hidden = false;
    document.getElementById('gate').style.display = 'none';
    document.body.classList.remove('locked');
    try { localStorage.setItem('true_engagement_pw', inp.value); } catch (_) {}
  } catch (ex) { err.textContent = 'wrong password'; inp.value = ''; inp.focus(); }
  return false;
}
(async () => {
  try {
    const cached = localStorage.getItem('true_engagement_pw');
    if (cached) {
      const innerHtml = await decryptPayload(cached);
      document.getElementById('content').innerHTML = innerHtml;
      document.getElementById('content').hidden = false;
      document.getElementById('gate').style.display = 'none';
      document.body.classList.remove('locked');
    }
  } catch (_) { try { localStorage.removeItem('true_engagement_pw'); } catch (_) {} }
})();
</script>
